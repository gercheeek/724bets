<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
    <style>
        /* Kept for Tailwind-based sub-pages (Tasks, Cases, Profile, Admin) */
        :root {
            --primary-color: #eab308;
        }
        .text-primary { color: var(--primary, #eab308); }
        .bg-primary { background-color: var(--primary, #eab308); }
        .border-primary { border-color: var(--primary, #eab308); }
        
        .glow-primary {
            box-shadow: 0 0 15px rgba(var(--primary-rgb, 234, 179, 8), 0.2);
        }
        .glow-button:hover {
            box-shadow: 0 0 20px var(--primary, #eab308);
        }
        
        .casino-glow {
            filter: drop-shadow(0 0 10px var(--primary, #eab308));
        }

        @keyframes soft-pulse {
            0%, 100% { opacity: 1; filter: brightness(1); }
            50% { opacity: 0.7; filter: brightness(1.3); }
        }
        .animate-soft-pulse {
            animation: soft-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 10s linear infinite;
        }
        
        /* Premium Case Opening Animation */
        .case-reel {
            display: flex;
            transition: transform 5s cubic-bezier(0.1, 0.7, 0.1, 1);
        }
    </style>
